name: "Deploy code changes to dockerhub"
on:
  push:
    branches:
      - master
    paths-ignore:
      - 'infra/**'
      - '.github/workflows/destroy.yaml'
      - '.github/workflows/infra-deploy.yaml'
      - 'monitoring/**'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Login to Dockerhub"
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Setup Docker Buildx"
        uses: docker/setup-buildx-action@v4
  
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/practiseecs:sha-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/practiseecs:latest
      
      - name: "Configure AWS credentials (OIDC)"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          aws-region: ap-south-1
          audience: sts.amazonaws.com

      - name: "Download current task definition"
        run: |
         aws ecs describe-task-definition \
          --task-definition my-node-app \
          --query 'taskDefinition' > task-def.json

      - name: "Update task definition with new image"
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: node-app
          image: ${{ secrets.DOCKERHUB_USERNAME }}/practiseecs:sha-${{ github.sha }}


      - name: "Deploy AWS ECS task definition"
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          cluster: my-ecs-cluster
          service: node-app-service
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          force-new-deployment: true
      